name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - claude/redesign-professional-storefront-I5VCZ
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply database schema
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Seed database (safe to run multiple times)
        run: npx tsx prisma/seed.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build and deploy to Cloudflare Workers
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync secrets to Worker
        run: |
          printf '%s' "${{ secrets.DATABASE_URL }}"           | npx wrangler secret put DATABASE_URL
          printf '%s' "${{ secrets.NEXTAUTH_SECRET }}"        | npx wrangler secret put NEXTAUTH_SECRET
          printf '%s' "${{ secrets.STRIPE_SECRET_KEY }}"      | npx wrangler secret put STRIPE_SECRET_KEY
          printf '%s' "${{ secrets.STRIPE_WEBHOOK_SECRET }}"  | npx wrangler secret put STRIPE_WEBHOOK_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
